# ============================================================================
# Zensical documentation configuration for nullcal
# ============================================================================

[project]

site_name = "nullcal Documentation"
site_description = "A Python package for constraining calibration errors of a closed-geometry network of gravitational-wave detectors."
site_author = "Isaac C. F. Wong"
site_url = "https://leuven-gravity-institute.github.io/nullcal/"
copyright = """
Copyright &copy; 2026 Leuven Gravity Institute
"""

nav = [
  { "Home" = "index.md" },
  { "User Guide" = [
    { "Quick Start" = "user-guide/quickstart.md" },
    { "Null Stream" = "user-guide/null-stream.md" },
    { "Calibration" = "user-guide/calibration.md" },
    { "Clustering" = "user-guide/clustering.md" },
    { "Likelihood" = "user-guide/likelihood.md" },
  ] },
  { "API Reference" = [
    { "Overview" = "reference/index.md" },
    { "nullcal" = "reference/nullcal/index.md" },
    { "nullcal.clustering" = "reference/nullcal/clustering/index.md" },
    { "nullcal.likelihood" = "reference/nullcal/likelihood/index.md" },
    { "nullcal.metadata" = "reference/nullcal/metadata/index.md" },
    { "nullcal.null_stream" = "reference/nullcal/null_stream/index.md" },
    { "nullcal.prior" = "reference/nullcal/prior/index.md" },
    { "nullcal.result" = "reference/nullcal/result/index.md" },
    { "nullcal.time_frequency_transform" = "reference/nullcal/time_frequency_transform/index.md" },
    { "nullcal.utils" = "reference/nullcal/utils/index.md" },
  ] },
  { "Developer Guide" = [
    { "Contributing" = "contributing.md" },
    { "Architecture" = "dev/architecture.md" },
  ] },
  { "Security" = "security.md" },
]

extra_javascript = [
  "javascripts/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]

language = "en"

features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# mkdocstrings plugin
# ----------------------------------------------------------------------------
[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.snippets]
