stages:
  - test

# ------------- Initial Stage -------------

.list-env: &list-env
  - PREFIX="$(dirname $(which python))/.."
  - if [ -d "${PREFIX}/conda-meta" ]; then
      conda list --prefix "${PREFIX}" --show-channel-urls;
    else
      python -m pip list installed;
    fi



# ------------- Test Stage -------------
.unit-tests: &unit-test
  stage: test
  script:
    - python -m pip install .
    - *list-env

    - pytest --cov=bilby --durations 10

python-3.10:
  <<: *unit-test
  needs: ["basic-3.10"]
  image: python:3.10