[build-system]
requires = ["setuptools>=40.6.0", "wheel", "Cython", "CythonGSL", "numpy"]
build-backend = "setuptools.build_meta"

[project]
name = "nullcal"
version = "0.3.0"
description = "A package to estimate the calibration parameters for gravitational-wave measurements using null stream."
authors = [{name="Isaac C.F. Wong",email="chunfung.wong@kuleuven.be"}]
license = {file="LICENSE"}
readme = "README.rst"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "numpy>=1.18.1",
    "CythonGSL",
    "pytest",
    "pytest-cov",
    "bilby>=2.3.0",
    "numba",
    "scipy",
]
[tool.setuptools.packages]
find = {}
[project.scripts]
